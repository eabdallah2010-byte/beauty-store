<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - متجر جمالك</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1><i class="fas fa-spa"></i> جمالك</h1>
                <p>متجر أدوات التجميل</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="products.html" class="active">المنتجات</a></li>
                    <li><a href="cart.html">سلة التسوق</a></li>
                </ul>
            </nav>
            <div class="cart-icon">
                <a href="cart.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="products-header">
                <h2>جميع المنتجات</h2>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 ابحثي عن منتج...">
                </div>
                <div class="filters">
                    <select id="category-filter">
                        <option value="all">جميع الأقسام</option>
                        <option value="makeup">مكياج</option>
                        <option value="tools">أدوات</option>
                        <option value="skincare">عناية بالبشرة</option>
                    </select>
                    <select id="sort-filter">
                        <option value="default">ترتيب حسب</option>
                        <option value="price-asc">السعر: من الأقل للأعلى</option>
                        <option value="price-desc">السعر: من الأعلى للأدنى</option>
                    </select>
                </div>
            </div>
            <div class="products-grid" id="all-products"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>جمالك</h4>
                    <p>أفضل متجر لأدوات التجميل في مصر والشرق الأوسط</p>
                </div>
                <div class="footer-section">
                    <h4>روابط سريعة</h4>
                    <ul>
                        <li><a href="index.html">الرئيسية</a></li>
                        <li><a href="products.html">المنتجات</a></li>
                        <li><a href="cart.html">سلة التسوق</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>تابعينا</h4>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 جمالك. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
